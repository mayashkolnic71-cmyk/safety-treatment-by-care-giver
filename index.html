    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #fcf8f2;
        }
        /* Custom scrollbar to match high-end UI */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* מנוע ההנפשות המשודרג של ה-SVGs הדינמיים */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        @keyframes breathe {
            0%, 100% { transform: scaleY(1) translateY(0); }
            50% { transform: scaleY(1.03) translateY(-1.5px); }
        }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        @keyframes hoverSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes waterDrip {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(35px) scale(0.5); opacity: 0; }
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0) translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-1.5deg) translate(-1px, 0.5px); }
            20%, 40%, 60%, 80% { transform: rotate(1.5deg) translate(1px, -0.5px); }
        }
        @keyframes bubbleFloat {
            0% { transform: translateY(15px) scale(0.6); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-50px) scale(1.1) translateX(10px); opacity: 0; }
        }
        @keyframes clockTick {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes alarmVibe {
            0%, 100% { transform: scale(1) rotate(0); }
            20% { transform: scale(1.04) rotate(-2deg); }
            40% { transform: scale(0.97) rotate(2deg); }
            60% { transform: scale(1.03) rotate(-1.5deg); }
            80% { transform: scale(0.98) rotate(1.5deg); }
        }
        @keyframes flowLight {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes handMassage {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            25% { transform: translate(-6px, -3px) rotate(-4deg); }
            75% { transform: translate(6px, 3px) rotate(4deg); }
        }
        @keyframes heatRadiation {
            0% { transform: scale(0.9); opacity: 0.1; }
            50% { opacity: 0.7; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes wheelSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        /* קבוצות קלאסים להנפשה קלה */
        .animate-heartbeat { animation: heartbeat 1.4s infinite ease-in-out; }
        .animate-breathe { animation: breathe 3s infinite ease-in-out; }
        .animate-blink { animation: blink 4s infinite ease-in-out; }
        .animate-hoverSoft { animation: hoverSoft 2.5s infinite ease-in-out; }
        .animate-waterDrip { animation: waterDrip 1s infinite ease-in; }
        .animate-shake { animation: shake 0.5s infinite ease-in-out; }
        .animate-bubble1 { animation: bubbleFloat 2s infinite ease-out; }
        .animate-bubble2 { animation: bubbleFloat 2.6s infinite ease-out 0.8s; }
        .animate-bubble3 { animation: bubbleFloat 3.2s infinite ease-out 1.5s; }
        .animate-clockTick { animation: clockTick 8s infinite linear; }
        .animate-alarmVibe { animation: alarmVibe 0.6s infinite ease-in-out; }
        .animate-flowLight { animation: flowLight 2s infinite ease-in-out; }
        .animate-ripple { animation: ripple 2s infinite ease-out; }
        .animate-handMassage { animation: handMassage 1.2s infinite ease-in-out; }
        .animate-heat { animation: heatRadiation 1.5s infinite ease-out; }
        .animate-wheelSpin { animation: wheelSpin 1s infinite linear; }

        /* קביעת מרכז הטרנספורמציה */
        svg * {
            transform-box: fill-box;
            transform-origin: center;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                        feedback: "מושלם! אתם מגלים אחריות ומקצועיות. רק הפיזיותרפיסט או איש צוות מוסמך אחר יכולים לוודא שההליכון בטוח, תקין ומותאם בדיוק למידותיה של חנה."
                    }
                ],
                svgDefault: `<svg viewBox="0 0 200 200" class="w-full h-full text-brand-teal max-h-[300px]" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="200" height="200" rx="20" fill="#f0fdfa"/>
                    <!-- הליכון גבוה מדי -->
                    <path d="M120 70 L120 160 M150 70 L150 160 M120 110 L150 110" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                    <!-- חנה מנסה להגיע -->
                    <path d="M70 120 C70 90 90 80 110 80" stroke="#f1f5f9" stroke-width="4"/>
                    <circle cx="65" cy="70" r="14" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
                    <path d="M55 70 C55 60 75 60 75 70 Z" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
                    <path d="M75 110 L115 80" stroke="#ffedd5" stroke-width="4" stroke-linecap="round"/>
                    <text x="90" y="50" fill="#0d9488" font-size="28" font-weight="bold" font-family="sans" class="animate-hoverSoft">?</text>
                </svg>`,
                svgCorrect: `<svg viewBox="0 0 200 200" class="w-full h-full max-h-[300px]" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="200" height="200" rx="20" fill="#d1fae5"/>
                    <!-- חנה יושבת בבטחה -->
                    <rect x="40" y="90" width="40" height="70" rx="5" fill="#3b82f6" opacity="0.8"/>
                    <circle cx="60" cy="70" r="14" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
                    <path d="M50 70 C50 60 70 60 70 70 Z" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
                    
                    <!-- איש צוות מוסמך (פיזיותרפיסט) עם ההליכון -->
                    <g class="animate-breathe">
                        <path d="M150 160 L150 90 L130 90 L130 160" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
                        <circle cx="160" cy="70" r="14" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
                        <path d="M140 160 L140 100 L160 80" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="165" cy="45" r="12" fill="#10b981" class="animate-alarmVibe"/>
                        <text x="165" y="50" fill="white" font-size="12" font-weight="bold" text-anchor="middle">✓</text>
                    </g>
                </svg>`,
                svgWrong: `<svg viewBox="0 0 200 200" class="w-full h-full max-h-[300px]" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="200" height="200" rx="20" fill="#fee2e2"/>
                    <!-- סכנת נפילה עם הליכון גבוה -->
                    <g class="animate-shake">
                        <!-- הליכון מתהפך אחורה -->
                        <path d="M120 70 L100 160 M150 70 L130 160 M110 110 L140 110" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" transform="rotate(15 125 115)"/>
                        <!-- חנה מועדת לאחור -->
                        <path d="M60 140 C50 110 60 90 90 80" stroke="#f1f5f9" stroke-width="4" transform="rotate(-15 60 140)"/>
                        <circle cx="45" cy="70" r="14" fill="#ffedd5" stroke="#991b1b" stroke-width="1.5"/>
                        <circle cx="42" cy="68" r="2" fill="#1e293b"/>
                        <circle cx="48" cy="68" r="2" fill="#1e293b"/>
                        <circle cx="45" cy="75" r="3" fill="#991b1b"/>
                    </g>
                    <!-- סימני אזהרה -->
                    <circle cx="160" cy="45" r="16" fill="#dc2626" class="animate-alarmVibe"/>
                    <text x="160" y="51" fill="white" font-size="16" font-weight="bold" text-anchor="middle">✗</text>
                </svg>`
            }
        ];

        let currentStepIndex = 0;
        const gameContent = document.getElementById('game-content');
        const progressBarContainer = document.getElementById('progress-bar-container');
        const progressTimeLabel = document.getElementById('progress-time-label');
        const progressStepLabel = document.getElementById('progress-step-label');
        const progressBarFill = document.getElementById('progress-bar-fill');

        function initGame() {
            renderStartScreen();
        }

        function renderStartScreen() {
            progressBarContainer.classList.add('hidden');
            gameContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center fade-in">
                    <div class="w-24 h-24 bg-brand-teal text-white rounded-full flex items-center justify-center mb-6 shadow-lg animate-breathe">
                        <i class="fa-solid fa-shield-heart text-4xl"></i>
                    </div>
                    <h1 class="text-3xl md:text-5xl font-bold text-brand-dark mb-4 font-varela">משמרת בטוחה</h1>
                    <p class="text-lg md:text-xl text-slate-600 mb-8 max-w-2xl mx-auto">
                        ברוכים הבאים למדריך הלמידה החווייתי למטפלות.<br>
                        הצטרפו אלינו למשמרת מלאה, קבלו החלטות נכונות, ועזרו לנו לשמור על בטיחות המטופלים.
                    </p>
                    <button onclick="startGame()" class="bg-brand-orange hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 text-lg mx-auto block">
                        <i class="fa-solid fa-play ml-2"></i> התחל משמרת
                    </button>
                </div>
            `;
        }

        function startGame() {
            currentStepIndex = 0;
            progressBarContainer.classList.remove('hidden');
            renderStep();
        }

        function renderStep() {
            const step = gameSteps[currentStepIndex];
            
            // עדכון סרגל התקדמות
            progressTimeLabel.innerText = 'שעה: ' + step.time;
            progressStepLabel.innerText = 'שלב ' + (currentStepIndex + 1) + ' מתוך ' + gameSteps.length;
            progressBarFill.style.width = ((currentStepIndex + 1) / gameSteps.length) * 100 + '%';

            gameContent.innerHTML = `
                <div class="fade-in max-w-4xl mx-auto w-full">
                    <div class="mb-4">
                        <span class="inline-block bg-teal-100 text-teal-800 text-xs px-3 py-1 rounded-full font-semibold border border-teal-200">
                            ${step.badge}
                        </span>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-brand-dark mb-2 font-varela">${step.title}</h2>
                    <p class="text-slate-600 mb-6 text-base md:text-lg leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">
                        ${step.scenario}
                    </p>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                        <!-- אזור אנימציה -->
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-inner flex items-center justify-center min-h-[250px]" id="svg-container">
                            ${step.svgDefault}
                        </div>

                        <!-- אזור שאלות -->
                        <div class="space-y-3" id="options-container">
                            ${step.options.map((opt, idx) => `
                                <button onclick="handleOptionClick(${idx})" class="w-full text-right p-4 rounded-xl border-2 border-slate-200 hover:border-brand-teal hover:bg-teal-50 transition-all duration-200 group flex items-start gap-4 bg-white shadow-sm">
                                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center font-bold group-hover:bg-brand-teal group-hover:text-white transition-colors">
                                        ${opt.key}
                                    </div>
                                    <span class="text-slate-700 font-medium leading-tight mt-1">${opt.text}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div id="feedback-container" class="mt-6 hidden"></div>
                </div>
            `;
        }

        window.handleOptionClick = function(optionIndex) {
            const step = gameSteps[currentStepIndex];
            const selectedOption = step.options[optionIndex];
            const optionsContainer = document.getElementById('options-container');
            const svgContainer = document.getElementById('svg-container');
            const feedbackContainer = document.getElementById('feedback-container');

            // נטרול הכפתורים
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('hover:border-brand-teal', 'hover:bg-teal-50');
            });

            // סימון התשובה שנבחרה
            const selectedBtn = buttons[optionIndex];
            selectedBtn.classList.remove('opacity-50');
            
            if (selectedOption.status === 'correct') {
                selectedBtn.classList.add('border-green-500', 'bg-green-50');
                selectedBtn.querySelector('div').classList.add('bg-green-500', 'text-white');
                svgContainer.innerHTML = step.svgCorrect;
                
                feedbackContainer.innerHTML = `
                    <div class="bg-green-100 border-l-4 border-green-500 p-4 rounded-r-lg flex flex-col md:flex-row items-start gap-4 fade-in">
                        <div class="bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 mt-1">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-green-800 text-lg mb-1">תשובה נכונה!</h3>
                            <p class="text-green-700">${selectedOption.feedback}</p>
                            <button onclick="nextStep()" class="mt-4 bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-sm">
                                ${currentStepIndex < gameSteps.length - 1 ? 'לשלב הבא <i class="fa-solid fa-arrow-left mr-2"></i>' : 'לסיום המשמרת <i class="fa-solid fa-flag-checkered mr-2"></i>'}
                            </button>
                        </div>
                    </div>
                `;
            } else {
                selectedBtn.classList.add('border-red-500', 'bg-red-50');
                selectedBtn.querySelector('div').classList.add('bg-red-500', 'text-white');
                svgContainer.innerHTML = step.svgWrong;

                feedbackContainer.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg flex flex-col md:flex-row items-start gap-4 fade-in">
                        <div class="bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 mt-1">
                            <i class="fa-solid fa-xmark"></i>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-red-800 text-lg mb-1">טעות...</h3>
                            <p class="text-red-700">${selectedOption.feedback}</p>
                            <button onclick="retryStep()" class="mt-4 bg-slate-200 hover:bg-slate-300 text-slate-800 px-6 py-2 rounded-lg font-medium transition-colors shadow-sm">
                                <i class="fa-solid fa-rotate-right ml-2"></i> נסה שוב
                            </button>
                        </div>
                    </div>
                `;
            }
            feedbackContainer.classList.remove('hidden');
            
            // גלול למטה כדי לראות את הפידבק
            feedbackContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.retryStep = function() {
            renderStep();
        }

        window.nextStep = function() {
            currentStepIndex++;
            if (currentStepIndex < gameSteps.length) {
                renderStep();
            } else {
                renderEndScreen();
            }
        }

        function renderEndScreen() {
            progressBarContainer.classList.add('hidden');
            
            gameContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center fade-in py-8">
                    <div class="w-32 h-32 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 shadow-xl relative animate-breathe mx-auto">
                        <i class="fa-solid fa-trophy text-6xl relative z-10"></i>
                        <div class="absolute inset-0 bg-green-200 rounded-full animate-ping opacity-75"></div>
                    </div>
                    <h1 class="text-3xl md:text-5xl font-bold text-brand-dark mb-4 font-varela">כל הכבוד! סיימתם משמרת בטוחה.</h1>
                    <p class="text-lg md:text-xl text-slate-600 mb-8 max-w-2xl bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mx-auto">
                        הוכחתם מקצועיות, חמלה ואחריות.<br>
                        בזכות מטפלים כמוכם, המטופלים שלנו נמצאים בידיים בטוחות וטובות.
                        תודה על המסירות שלכם!
                    </p>
                    <button onclick="initGame()" class="bg-brand-teal hover:bg-teal-700 text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 text-lg mx-auto block">
                        <i class="fa-solid fa-rotate-right ml-2"></i> התחל משמרת מחדש
                    </button>
                </div>
            `;
            
            fireConfetti();
        }

        function fireConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#0d9488', '#ff7f50', '#059669', '#fef08a']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#0d9488', '#ff7f50', '#059669', '#fef08a']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // אתחול המשחק כשהעמוד עולה
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
