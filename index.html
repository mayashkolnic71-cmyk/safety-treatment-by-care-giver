<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משמרת בטוחה - מדריך למטפלות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Load Translations Data -->
    <script src="translations.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            teal: '#0d9488',
                            dark: '#0f172a',
                            orange: '#e85d19'
                        }
                    },
                    fontFamily: {
                        sans: ['Rubik', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-breathe {
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
    
    <!-- Header & Lang Selector -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-teal text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-heart-pulse text-xl"></i>
                </div>
                <h1 id="pageTitle" class="text-xl md:text-2xl font-bold text-brand-dark"></h1>
            </div>
            <!-- Language Selector -->
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-globe text-brand-teal text-xl"></i>
                <select id="langSelect" onchange="changeLang(this.value)" class="bg-slate-100 border border-slate-300 text-slate-700 py-2 px-3 rounded-lg font-medium focus:outline-none focus:ring-2 focus:ring-brand-teal transition-all cursor-pointer">
                    <option value="he">עברית</option>
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                    <option value="ru">Русский</option>
                    <option value="ne">नेपाली</option>
                </select>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6" id="mainContainer">
        <!-- The content will be rendered here via JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-brand-dark text-slate-300 py-10 mt-12">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8" id="footerBadges"></div>
            <p class="text-slate-400 text-sm mb-4" id="footerText1"></p>
            <p class="text-slate-400 text-sm mb-2" id="footerText2"></p>
            <p class="text-slate-400 text-sm" id="footerText3"></p>
        </div>
    </footer>

    <script>
        let currentLang = 'he';
        let currentStepIndex = 0;
        const mainContainer = document.getElementById('mainContainer');
        const applauseAudio = new Audio('https://actions.google.com/sounds/v1/crowds/light_applause.ogg');
        applauseAudio.load();
        applauseAudio.volume = 0.6;

        function playApplauseSound() {
            applauseAudio.currentTime = 0;
            applauseAudio.play().catch(e => console.log('Audio play failed:', e));
        }

        function fireConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#0d9488', '#ff7f50', '#059669', '#fef08a'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#0d9488', '#ff7f50', '#059669', '#fef08a'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function fireMiniConfetti() {
            confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 }, colors: ['#10b981', '#34d399', '#fef08a', '#ff7f50'] });
        }

        function changeLang(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            // Set DIR and Lang
            document.documentElement.dir = t.dir;
            document.documentElement.lang = lang;
            
            // Update Global Static Texts
            document.getElementById('pageTitle').innerText = t.pageTitle;
            document.title = t.pageTitle;
            document.getElementById('footerText1').innerText = t.footerText1;
            document.getElementById('footerText2').innerText = t.footerText2;
            document.getElementById('footerText3').innerText = t.footerText3;
            
            // Render Footer Badges
            document.getElementById('footerBadges').innerHTML = t.badges.map(b => `
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center mb-3 text-brand-teal">
                        <i class="fa-solid fa-star"></i>
                    </div>
                    <h4 class="text-white font-bold mb-1 text-sm">${b.title}</h4>
                    <p class="text-xs text-slate-400">${b.desc}</p>
                </div>
            `).join('');
            
            // Re-render current view based on state
            if (window.currentState === 'game') renderStep();
            else if (window.currentState === 'end') renderEndScreen();
            else renderStartScreen();
        }

        function renderStartScreen() {
            window.currentState = 'start';
            const t = translations[currentLang];
            
            let rulesHtml = t.rules.map((rule, idx) => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:border-brand-teal transition-colors">
                    <div class="w-10 h-10 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center mb-4 font-bold text-lg">
                        ${idx + 1}
                    </div>
                    <h3 class="text-xl font-bold text-brand-dark mb-3">${rule.title}</h3>
                    <ul class="space-y-2 text-slate-600">
                        ${rule.items.map(item => `<li class="flex items-start gap-2"><i class="fa-solid fa-check text-brand-teal mt-1 text-sm flex-shrink-0"></i><span>${item}</span></li>`).join('')}
                    </ul>
                </div>
            `).join('');

            mainContainer.innerHTML = `
                <!-- Infographic Section -->
                <div class="max-w-6xl mx-auto mb-16 bg-gradient-to-b from-slate-100 to-white rounded-3xl p-8 border border-slate-200 shadow-lg">
                    <div class="text-center mb-10">
                        <span class="inline-block bg-teal-100 text-teal-800 px-4 py-1 rounded-full font-bold text-sm mb-4">
                            <i class="fa-solid fa-book-medical mr-2"></i> ${t.infoBadge}
                        </span>
                        <h2 class="text-3xl md:text-5xl font-bold text-brand-dark mb-4">${t.infoTitle}</h2>
                        <p class="text-xl text-brand-teal font-medium mb-4">${t.infoSubtitle}</p>
                        <p class="text-slate-600 max-w-2xl mx-auto">${t.infoDesc}</p>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                        ${rulesHtml}
                    </div>
                    
                    <div class="bg-teal-50 border border-teal-200 p-6 rounded-2xl text-center">
                        <p class="text-lg text-teal-900">${t.infoSummary}</p>
                    </div>
                </div>

                <!-- Simulation Start Section -->
                <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                    <div class="w-full h-64 md:h-80 bg-slate-200 relative overflow-hidden">
                        <img src="assets/hero.png" alt="Hero Caregiver Image" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-brand-dark/70 to-transparent flex items-end">
                            <h2 class="text-white text-3xl font-bold p-6 md:p-8">${t.pageTitle}</h2>
                        </div>
                    </div>
                    <div class="p-8 md:p-12 text-center">
                        <div class="w-24 h-24 bg-teal-50 text-brand-teal rounded-full flex items-center justify-center mb-8 mx-auto shadow-inner mt-4 md:mt-0">
                            <i class="fa-solid fa-user-nurse text-4xl"></i>
                        </div>
                        <p class="text-lg md:text-2xl text-slate-600 mb-8 leading-relaxed font-light">
                            ${t.startGreeting}
                        </p>
                        
                        <div class="bg-teal-50 border border-teal-200 rounded-2xl p-6 mb-10 text-teal-800 flex items-center justify-between gap-6 text-lg md:text-xl shadow-sm">
                            <div class="font-medium leading-snug">
                                ${t.startInstruction}
                            </div>
                            <div class="bg-teal-600 text-white w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-sm">
                                <i class="fa-solid fa-info"></i>
                            </div>
                        </div>
                        
                        <button onclick="startGame()" class="bg-brand-orange hover:bg-orange-600 text-white font-bold py-4 px-12 rounded-full shadow-md transition-transform hover:scale-105 text-xl mx-auto flex items-center justify-center gap-3">
                            <span>${t.startBtn}</span>
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function startGame() {
            currentStepIndex = 0;
            renderStep();
        }

        function renderStep() {
            window.currentState = 'game';
            const t = translations[currentLang];
            const step = t.gameSteps[currentStepIndex];
            
            const progressText = t.stepProgress.replace('{current}', currentStepIndex + 1).replace('{total}', t.gameSteps.length);
            const timeText = t.stepTime.replace('{time}', step.time);
            const progressPercent = ((currentStepIndex + 1) / t.gameSteps.length) * 100;

            let isRtl = t.dir === 'rtl';

            mainContainer.innerHTML = `
                <div class="max-w-4xl mx-auto w-full">
                    <!-- Progress Bar -->
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-8">
                        <div class="flex justify-between text-sm font-bold text-slate-500 mb-2">
                            <span>${progressText}</span>
                            <span class="text-brand-teal">${timeText}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden flex">
                            <div class="bg-gradient-to-r from-teal-400 to-brand-teal h-3 transition-all duration-500 ease-out" style="width: ${progressPercent}%; ${isRtl ? 'margin-left: auto;' : ''}"></div>
                        </div>
                    </div>

                    <div class="fade-in">
                        <div class="mb-4">
                            <span class="inline-block bg-teal-100 text-teal-800 text-xs px-3 py-1 rounded-full font-semibold border border-teal-200">
                                ${step.badge}
                            </span>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-brand-dark mb-2">${step.title}</h2>
                        <p class="text-slate-600 mb-6 text-base md:text-lg leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">
                            ${step.scenario}
                        </p>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <!-- Image Area -->
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-inner flex items-center justify-center min-h-[250px]" id="img-container">
                                <img src="${step.imageDefault}" alt="Scenario Image" class="w-full max-h-64 object-contain rounded-xl shadow-md transition-all">
                            </div>

                            <!-- Options Area -->
                            <div class="space-y-3" id="options-container">
                                ${step.options.map((opt, idx) => `
                                    <button onclick="handleOptionClick(${idx})" class="w-full ${isRtl ? 'text-right' : 'text-left'} p-4 rounded-xl border-2 border-slate-200 hover:border-brand-teal hover:bg-teal-50 transition-all duration-200 group flex items-start gap-4 bg-white shadow-sm">
                                        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center font-bold group-hover:bg-brand-teal group-hover:text-white transition-colors">
                                            ${idx + 1}
                                        </div>
                                        <span class="text-slate-700 font-medium leading-tight mt-1">${opt.text}</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div id="feedback-container" class="mt-6 hidden"></div>
                    </div>
                </div>
            `;
        }

        window.handleOptionClick = function(optionIndex) {
            const t = translations[currentLang];
            const step = t.gameSteps[currentStepIndex];
            const selectedOption = step.options[optionIndex];
            const optionsContainer = document.getElementById('options-container');
            const imgContainer = document.getElementById('img-container');
            const feedbackContainer = document.getElementById('feedback-container');

            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('hover:border-brand-teal', 'hover:bg-teal-50');
            });

            const selectedBtn = buttons[optionIndex];
            selectedBtn.classList.remove('opacity-50');
            
            if (selectedOption.status === 'correct') {
                selectedBtn.classList.add('border-green-500', 'bg-green-50');
                selectedBtn.querySelector('div').classList.add('bg-green-500', 'text-white');
                imgContainer.innerHTML = `<img src="${step.imageCorrect}" class="w-full max-h-64 object-contain rounded-xl shadow-lg border-4 border-green-500 fade-in">`;
                
                fireMiniConfetti();
                playApplauseSound();
                
                const nextBtnText = currentStepIndex < t.gameSteps.length - 1 ? t.nextBtn : t.finishBtn;

                feedbackContainer.innerHTML = `
                    <div class="bg-green-100 border-l-4 border-green-500 p-4 rounded-xl flex flex-col md:flex-row items-start gap-4 fade-in mt-4 shadow-sm">
                        <div class="bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 mt-1">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-green-800 text-lg mb-1">${t.correctTitle}</h3>
                            <p class="text-green-700">${selectedOption.feedback}</p>
                            <button onclick="nextStep()" class="mt-4 bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-md">
                                ${nextBtnText}
                            </button>
                        </div>
                    </div>
                `;
            } else {
                selectedBtn.classList.add('border-red-500', 'bg-red-50');
                selectedBtn.querySelector('div').classList.add('bg-red-500', 'text-white');
                imgContainer.innerHTML = `<img src="${step.imageWrong}" class="w-full max-h-64 object-contain rounded-xl shadow-lg border-4 border-red-500 fade-in">`;

                feedbackContainer.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl flex flex-col md:flex-row items-start gap-4 fade-in mt-4 shadow-sm">
                        <div class="bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 mt-1">
                            <i class="fa-solid fa-xmark"></i>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-red-800 text-lg mb-1">${t.wrongTitle}</h3>
                            <p class="text-red-700">${selectedOption.feedback}</p>
                            <button onclick="retryStep()" class="mt-4 bg-slate-200 hover:bg-slate-300 text-slate-800 px-6 py-2 rounded-lg font-medium transition-colors shadow-sm">
                                ${t.retryBtn} <i class="fa-solid fa-rotate-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                `;
            }
            feedbackContainer.classList.remove('hidden');
            feedbackContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.retryStep = function() { renderStep(); }
        window.nextStep = function() {
            currentStepIndex++;
            if (currentStepIndex < translations[currentLang].gameSteps.length) renderStep();
            else renderEndScreen();
        }

        function renderEndScreen() {
            window.currentState = 'end';
            const t = translations[currentLang];
            
            mainContainer.innerHTML = `
                <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 p-8 md:p-12">
                    <div class="flex flex-col items-center justify-center text-center fade-in">
                        <div class="w-32 h-32 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 shadow-xl relative animate-breathe mx-auto">
                            <i class="fa-solid fa-trophy text-6xl relative z-10"></i>
                            <div class="absolute inset-0 bg-green-200 rounded-full animate-ping opacity-75"></div>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-bold text-brand-dark mb-4">${t.endTitle}</h1>
                        <p class="text-lg md:text-xl text-slate-600 mb-8 max-w-2xl mx-auto p-6 rounded-2xl bg-slate-50 border border-slate-100">
                            ${t.endDesc}
                        </p>
                        
                        <!-- Video Section -->
                        <div id="videoContainer" class="w-full max-w-2xl mx-auto mb-8 hidden">
                            <div class="aspect-video rounded-2xl overflow-hidden shadow-xl border-4 border-brand-teal bg-slate-900">
                                <iframe src="https://labs.google/fx/tools/flow/shared/video/b184a454-efbe-4889-b251-a312d5d8288c" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 justify-center mt-4 w-full">
                            <button onclick="document.getElementById('videoContainer').classList.remove('hidden'); this.style.display='none';" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-md transition-transform hover:scale-105 text-lg flex items-center justify-center gap-3 w-full sm:w-auto">
                                <i class="fa-solid fa-video"></i> ${t.videoBtn}
                            </button>
                            <button onclick="startGame()" class="bg-brand-teal hover:bg-teal-700 text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 text-lg flex items-center gap-2 w-full sm:w-auto justify-center">
                                <i class="fa-solid fa-rotate-right"></i> ${t.playAgainBtn}
                            </button>
                        </div>
                    </div>
                </div>
            `;
            fireConfetti();
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('safeShiftLang') || 'he';
            document.getElementById('langSelect').value = savedLang;
            changeLang(savedLang);
        });

        // Save lang choice
        document.getElementById('langSelect').addEventListener('change', (e) => {
            localStorage.setItem('safeShiftLang', e.target.value);
        });
    </script>
</body>
</html>
